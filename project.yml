name: Tsukuyomi
options:
  bundleIdPrefix: com.hibajiri
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    PRODUCT_NAME: Tsukuyomi
    PRODUCT_BUNDLE_IDENTIFIER: com.hibajiri.tsukuyomi
    MARKETING_VERSION: 0.1.20260708203505
    CURRENT_PROJECT_VERSION: 20260708203505
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: 1
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Tsukuyomi/Support/Info.plist
packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.6.0
targets:
  Tsukuyomi:
    type: application
    platform: iOS
    sources:
      - path: Tsukuyomi
    dependencies:
      - package: SwiftSoup
    settings:
      base:
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
    scheme:
      testTargets: []
